<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>How well do you know us? 💕</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:    #ede8f5;
  --card:  #faf7ff;
  --green: #5a8a50;
  --grn2:  #3d6636;
  --lav:   #8b7cbf;
  --lav2:  #6a5ca0;
  --cream: #fdf6e8;
  --ink:   #2a2040;
  --muted: #7a6e90;
  --correct: #5a8a50;
  --wrong:   #c0504a;
  --correct-bg: #e8f2e4;
  --wrong-bg:   #faeaea;
}

html,body{width:100%;min-height:100%;overflow-x:hidden;font-family:'DM Sans',sans-serif;color:var(--ink);background:var(--bg);}

/* animated bg blobs */
.blob{position:fixed;border-radius:50%;filter:blur(60px);pointer-events:none;z-index:0;animation:drift ease-in-out infinite;}
.b1{width:400px;height:400px;background:rgba(139,124,191,0.22);top:-100px;left:-100px;animation-duration:18s;}
.b2{width:340px;height:340px;background:rgba(90,138,80,0.18);bottom:-80px;right:-80px;animation-duration:22s;animation-delay:-9s;}
.b3{width:260px;height:260px;background:rgba(253,246,232,0.40);top:40%;left:60%;animation-duration:16s;animation-delay:-5s;}
@keyframes drift{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(30px,-20px) scale(1.05);}}

/* ── INTRO ── */
#intro{
  position:fixed;inset:0;z-index:100;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  text-align:center;padding:2rem;
  background:var(--bg);
  transition:opacity 1.2s ease,visibility 1.2s ease;
}
#intro.out{opacity:0;visibility:hidden;pointer-events:none;}

.intro-tag{font-size:0.62rem;letter-spacing:0.45em;text-transform:uppercase;color:var(--lav);font-weight:400;margin-bottom:1rem;animation:up 0.8s 0.2s both;}
.intro-title{font-family:'Playfair Display',serif;font-size:clamp(2.2rem,7vw,4rem);line-height:1.1;color:var(--ink);margin-bottom:0.5rem;animation:up 0.8s 0.4s both;}
.intro-title em{color:var(--lav);font-style:italic;}
.intro-sub{font-size:clamp(0.9rem,2.5vw,1.05rem);color:var(--muted);font-weight:300;max-width:340px;line-height:1.6;margin-bottom:2rem;animation:up 0.8s 0.6s both;}
.intro-meta{display:flex;gap:1.5rem;justify-content:center;margin-bottom:2rem;animation:up 0.8s 0.7s both;}
.meta-pill{
  padding:0.4rem 1rem;border-radius:99px;font-size:0.72rem;font-weight:400;
  background:var(--card);border:1px solid rgba(139,124,191,0.25);color:var(--muted);
}
.start-btn{
  padding:0.85rem 2.8rem;border-radius:99px;
  background:var(--lav);color:white;border:none;
  font-family:'DM Sans',sans-serif;font-size:0.82rem;
  font-weight:500;letter-spacing:0.12em;text-transform:uppercase;
  cursor:pointer;transition:background 0.25s,transform 0.2s;
  animation:up 0.8s 0.9s both;
  box-shadow:0 4px 20px rgba(139,124,191,0.35);
}
.start-btn:hover{background:var(--lav2);transform:scale(1.04);}

/* ── QUIZ WRAP ── */
#quiz{
  position:relative;z-index:1;
  max-width:560px;width:100%;
  margin:0 auto;
  padding:2rem 1.2rem 5rem;
  display:none;
}

/* progress bar */
.progress-track{
  width:100%;height:5px;background:rgba(139,124,191,0.18);
  border-radius:99px;margin-bottom:2.5rem;overflow:hidden;
}
.progress-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--green),var(--lav));transition:width 0.5s ease;}

/* question counter */
.q-counter{
  font-size:0.62rem;letter-spacing:0.4em;text-transform:uppercase;
  color:var(--lav);font-weight:400;margin-bottom:0.8rem;
  text-align:center;
}

/* question card */
.q-card{
  background:var(--card);
  border-radius:20px;
  padding:2rem 1.6rem 1.6rem;
  border:1px solid rgba(139,124,191,0.18);
  box-shadow:0 4px 30px rgba(42,32,64,0.07);
  margin-bottom:1rem;
  animation:cardIn 0.5s ease both;
}
@keyframes cardIn{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:none;}}

.q-emoji{font-size:2rem;margin-bottom:0.8rem;display:block;text-align:center;}
.q-text{
  font-family:'Playfair Display',serif;
  font-size:clamp(1.1rem,3vw,1.4rem);
  line-height:1.5;text-align:center;color:var(--ink);
  margin-bottom:1.6rem;
}

/* answer options */
.options{display:flex;flex-direction:column;gap:0.7rem;}
.opt{
  padding:0.9rem 1.2rem;
  border-radius:12px;
  border:1.5px solid rgba(139,124,191,0.22);
  background:white;
  font-size:0.92rem;font-weight:400;color:var(--ink);
  cursor:pointer;text-align:left;
  transition:border-color 0.2s,background 0.2s,transform 0.15s;
  position:relative;overflow:hidden;
}
.opt:hover:not(.locked){border-color:var(--lav);background:#f5f0ff;transform:translateX(4px);}
.opt.correct{background:var(--correct-bg);border-color:var(--correct);color:var(--grn2);}
.opt.wrong  {background:var(--wrong-bg);  border-color:var(--wrong);  color:var(--wrong);}
.opt.locked {cursor:default;}
.opt .tick{margin-right:0.5rem;}

/* feedback bubble */
.feedback{
  margin-top:1rem;padding:0.9rem 1.2rem;
  border-radius:12px;font-size:0.88rem;line-height:1.5;
  font-weight:400;text-align:center;
  display:none;
}
.feedback.show{display:block;animation:up 0.3s ease both;}
.feedback.ok {background:var(--correct-bg);color:var(--grn2);border:1px solid rgba(90,138,80,0.25);}
.feedback.no {background:var(--wrong-bg);  color:var(--wrong);  border:1px solid rgba(192,80,74,0.25);}

/* next btn */
.next-btn{
  display:none;width:100%;margin-top:1rem;
  padding:0.85rem;border-radius:12px;
  background:var(--green);color:white;border:none;
  font-family:'DM Sans',sans-serif;font-size:0.85rem;
  font-weight:500;cursor:pointer;
  transition:background 0.25s,transform 0.2s;
  box-shadow:0 4px 16px rgba(90,138,80,0.30);
}
.next-btn:hover{background:var(--grn2);transform:translateY(-1px);}
.next-btn.show{display:block;animation:up 0.4s ease both;}

/* ── RESULTS ── */
#results{
  position:relative;z-index:1;
  max-width:560px;width:100%;
  margin:0 auto;padding:2rem 1.2rem 5rem;
  display:none;text-align:center;
}

.res-emoji{font-size:3.5rem;margin-bottom:1rem;display:block;animation:pop 0.6s 0.2s both;}
@keyframes pop{0%{transform:scale(0);}70%{transform:scale(1.2);}100%{transform:scale(1);}}

.res-score{
  font-family:'Playfair Display',serif;
  font-size:clamp(3rem,10vw,5rem);
  font-weight:700;color:var(--lav);
  line-height:1;margin-bottom:0.3rem;
  animation:up 0.6s 0.4s both;
}
.res-label{font-size:0.7rem;letter-spacing:0.4em;text-transform:uppercase;color:var(--muted);margin-bottom:1.5rem;animation:up 0.6s 0.5s both;}
.res-title{
  font-family:'Playfair Display',serif;font-style:italic;
  font-size:clamp(1.3rem,4vw,2rem);color:var(--ink);
  margin-bottom:0.5rem;animation:up 0.6s 0.6s both;
}
.res-msg{font-size:0.95rem;color:var(--muted);line-height:1.6;max-width:380px;margin:0 auto 2rem;animation:up 0.6s 0.7s both;}

/* photo upload on results */
.photo-zone{
  background:var(--card);border-radius:20px;
  padding:1.5rem;border:1.5px dashed rgba(139,124,191,0.35);
  margin-bottom:1.5rem;cursor:pointer;position:relative;
  transition:border-color 0.25s;
  animation:up 0.6s 0.8s both;
}
.photo-zone:hover{border-color:var(--lav);}
.photo-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;}
.photo-zone img{width:100%;max-height:260px;object-fit:cover;border-radius:12px;display:none;}
.photo-zone img.on{display:block;}
.photo-hint{font-size:0.78rem;color:var(--muted);margin-top:0.5rem;}
.photo-placeholder{display:flex;flex-direction:column;align-items:center;gap:0.5rem;padding:1rem 0;}
.photo-placeholder span{font-size:2rem;}
.photo-placeholder p{font-size:0.78rem;color:var(--muted);}

/* review list */
.review{margin-bottom:1.5rem;text-align:left;animation:up 0.6s 0.9s both;}
.review-item{
  display:flex;align-items:flex-start;gap:0.7rem;
  padding:0.7rem 0.9rem;border-radius:10px;
  font-size:0.82rem;margin-bottom:0.5rem;
}
.review-item.ok{background:var(--correct-bg);color:var(--grn2);}
.review-item.no{background:var(--wrong-bg);  color:var(--wrong);}
.review-item .ri{flex-shrink:0;font-size:1rem;}
.review-q{font-weight:500;margin-bottom:0.1rem;}
.review-a{font-weight:300;font-size:0.78rem;opacity:0.85;}

.play-again{
  padding:0.85rem 2.4rem;border-radius:99px;
  background:var(--lav);color:white;border:none;
  font-family:'DM Sans',sans-serif;font-size:0.82rem;
  font-weight:500;letter-spacing:0.1em;text-transform:uppercase;
  cursor:pointer;transition:background 0.25s,transform 0.2s;
  box-shadow:0 4px 20px rgba(139,124,191,0.35);
  animation:up 0.6s 1s both;
}
.play-again:hover{background:var(--lav2);transform:scale(1.04);}

/* confetti */
.confetti{position:fixed;pointer-events:none;z-index:200;font-size:1.2rem;animation:confettiFall linear forwards;}
@keyframes confettiFall{0%{opacity:1;transform:translateY(-20px) rotate(0deg);}100%{opacity:0;transform:translateY(100vh) rotate(720deg);}}

@keyframes up{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:none;}}
</style>
</head>
<body>

<div class="blob b1"></div>
<div class="blob b2"></div>
<div class="blob b3"></div>

<!-- INTRO -->
<div id="intro">
  <p class="intro-tag">A birthday quiz 💕</p>
  <h1 class="intro-title">Do you know us,<br><em>my love?</em></h1>
  <p class="intro-sub">7 questions about our story — no cheating, darling! 😄</p>
  <div class="intro-meta">
    <span class="meta-pill">7 questions</span>
    <span class="meta-pill">No cheating! 🙈</span>
    <span class="meta-pill">Made with ♡</span>
  </div>
  <button class="start-btn" onclick="startQuiz()">Let's go! →</button>
</div>

<!-- QUIZ -->
<div id="quiz">
  <div class="progress-track"><div class="progress-fill" id="pbar" style="width:0%"></div></div>
  <div class="q-counter" id="qcounter">Question 1 of 7</div>
  <div class="q-card" id="qcard">
    <span class="q-emoji" id="qemoji"></span>
    <p class="q-text" id="qtext"></p>
    <div class="options" id="options"></div>
    <div class="feedback" id="feedback"></div>
  </div>
  <button class="next-btn" id="nextbtn" onclick="nextQ()">Next →</button>
</div>

<script>

  {
    emoji: '🎂',
    q: 'What did you never ask me to cook for your birthday?',
    opts: ['Shkmeruli', 'Khinkali', 'Meat pies', 'Sushi'],
    correct: 1,

    no: '🍽️ It was Khinkali! You never asked for them — surprising, right?'
  },
  {

];

let current = 0;
let score = 0;
let answered = false;
let results = [];

function startQuiz(){
  document.getElementById('intro').classList.add('out');
  document.getElementById('quiz').style.display='block';
  showQ();
}

function showQ(){
  answered = false;
  const q = questions[current];
  document.getElementById('qcounter').textContent = `Question ${current+1} of ${questions.length}`;
  document.getElementById('pbar').style.width = `${(current/questions.length)*100}%`;
  document.getElementById('qemoji').textContent = q.emoji;
  document.getElementById('qtext').textContent = q.q;

  const fb = document.getElementById('feedback');
  fb.className='feedback'; fb.textContent='';

  const nb = document.getElementById('nextbtn');
  nb.className='next-btn';

  // re-animate card
  const card = document.getElementById('qcard');
  card.style.animation='none';
  card.offsetHeight;
  card.style.animation='';

  const opts = document.getElementById('options');
  opts.innerHTML='';
  q.opts.forEach((o,i)=>{
    const btn=document.createElement('button');
    btn.className='opt';
    btn.textContent=o;
    btn.onclick=()=>answer(i);
    opts.appendChild(btn);
  });
}

function answer(i){
  if(answered) return;
  answered=true;
  const q=questions[current];
  const opts=document.querySelectorAll('.opt');
  const fb=document.getElementById('feedback');
  const nb=document.getElementById('nextbtn');

  opts.forEach((b,idx)=>{
    b.classList.add('locked');
    if(idx===q.correct) b.innerHTML='<span class="tick">✓</span>'+b.textContent;
    else if(idx===i && i!==q.correct) b.innerHTML='<span class="tick">✗</span>'+b.textContent;
  });

  const correct = i===q.correct;
  if(correct){ score++; fb.className='feedback ok show'; fb.textContent=q.ok; }
  else        { fb.className='feedback no show'; fb.textContent=q.no; }

  results.push({q:q.q, correct, chosen:q.opts[i], answer:q.opts[q.correct]});
  nb.className='next-btn show';
  nb.textContent = current<questions.length-1 ? 'Next →' : 'See results 🎉';
}

function nextQ(){
  current++;
  if(current<questions.length){ showQ(); }
  else { showResults(); }
}

function showResults(){
  document.getElementById('quiz').style.display='none';
  const r=document.getElementById('results');
  r.style.display='block';

  const pct = score/questions.length;
  let emoji,title,msg;
  if(pct===1){
    emoji='🏆'; title='Perfect score — you know us inside out!';
    msg='7 out of 7! You\'re basically the expert on our relationship. I\'m impressed and very in love 💜';
  } else if(pct>=0.71){
    emoji='🌿'; title='Pretty good, love!';
    msg='You got most of them! A few surprises in there, but you clearly pay attention 🥰';
  } else if(pct>=0.43){
    emoji='😄'; title='Not bad… but room to learn!';
    msg='We might need to spend more quality time together so you can catch up 😉 Lucky for you, I\'m right here ♡';
  } else {
    emoji='🙈'; title='Hmm';
    msg='Not quite, but that just means we have more stories left to make together — and I\'m very much looking forward to that 💜';
  }

  document.getElementById('res-emoji').textContent=emoji;
  document.getElementById('res-score').textContent=score;
  document.getElementById('res-title').textContent=title;
  document.getElementById('res-msg').textContent=msg;

  // review list
  const rev=document.getElementById('review');
  rev.innerHTML='';
  results.forEach(r=>{
    const d=document.createElement('div');
    d.className='review-item '+(r.correct?'ok':'no');
    d.innerHTML=`<span class="ri">${r.correct?'✓':'✗'}</span><div><div class="review-q">${r.q}</div><div class="review-a">${r.correct?'Correct! ✓':'Your answer: '+r.chosen+' · Correct: '+r.answer}</div></div>`;
    rev.appendChild(d);
  });

  if(pct===1) launchConfetti();
}



function launchConfetti(){
  const em=['💜','🌿','✨','🥟','❤️','🎉','🌸'];
  for(let i=0;i<30;i++){
    setTimeout(()=>{
      const c=document.createElement('div');
      c.className='confetti';
      c.textContent=em[Math.floor(Math.random()*em.length)];
      c.style.left=Math.random()*100+'vw';
      c.style.top='-30px';
      c.style.fontSize=(0.8+Math.random()*0.8)+'rem';
      c.style.animationDuration=(2+Math.random()*2)+'s';
      document.body.appendChild(c);
      setTimeout(()=>c.remove(),4000);
    },i*80);
  }
}

function restart(){
  current=0; score=0; answered=false; results=[];
  document.getElementById('results').style.display='none';
  document.getElementById('pbar').style.width='0%';
  document.getElementById('quiz').style.display='block';

  showQ();
}
</script>
